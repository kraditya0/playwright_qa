name: Automated QA with Playwright and GitHub Actions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  qa-scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 23f3000360@ds.study.iitm.ac.in - Install Playwright
        run: npm install playwright

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Scraper and Print Total
        run: node scrape.js
